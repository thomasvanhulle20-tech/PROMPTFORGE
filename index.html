<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptForge — Génère. Affine. Crée.</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #ff6b2b;
    --accent2: #7c3aed;
    --accent3: #06b6d4;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --glow: rgba(255,107,43,0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, rgba(255,107,43,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 60px 24px 100px; }
  header { text-align: center; margin-bottom: 60px; }
  .logo-tag {
    display: inline-block;
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--accent); border: 1px solid var(--accent);
    padding: 6px 16px; margin-bottom: 24px;
    animation: fadeDown 0.6s ease both;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(42px, 8vw, 72px);
    font-weight: 800; line-height: 1; letter-spacing: -2px;
    animation: fadeDown 0.6s ease 0.1s both;
  }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 13px; margin-top: 16px; letter-spacing: 1px; animation: fadeDown 0.6s ease 0.2s both; }
  .input-section { animation: fadeUp 0.6s ease 0.3s both; }
  .input-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: block; }
  .input-wrapper {
    position: relative;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 40px var(--glow); }
  .input-corner { position: absolute; width: 10px; height: 10px; border-color: var(--accent); border-style: solid; z-index: 2; }
  .input-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .input-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .input-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .input-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  textarea {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 14px; line-height: 1.7; padding: 24px;
    resize: none; min-height: 140px;
  }
  textarea::placeholder { color: var(--muted); }
  .input-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; border-top: 1px solid var(--border); }
  .char-count { font-size: 11px; color: var(--muted); }
  .examples { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; margin-bottom: 28px; }
  .example-chip {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-family: 'Space Mono', monospace;
    font-size: 11px; padding: 6px 14px; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .example-chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,107,43,0.05); }
  .generate-btn {
    width: 100%; background: var(--accent); color: #fff; border: none;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px;
    letter-spacing: 2px; text-transform: uppercase; padding: 18px 40px;
    cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
  }
  .generate-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%); transition: transform 0.5s;
  }
  .generate-btn:hover::before { transform: translateX(100%); }
  .generate-btn:hover { background: #ff8050; transform: translateY(-1px); box-shadow: 0 8px 30px rgba(255,107,43,0.4); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .loader { display: none; text-align: center; padding: 60px 0; }
  .loader.active { display: block; }
  .loader-bars { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; }
  .loader-bar { width: 4px; height: 40px; background: var(--accent); animation: barPulse 1s ease-in-out infinite; }
  .loader-bar:nth-child(1) { animation-delay: 0s; }
  .loader-bar:nth-child(2) { animation-delay: 0.15s; }
  .loader-bar:nth-child(3) { animation-delay: 0.3s; }
  .loader-bar:nth-child(4) { animation-delay: 0.45s; }
  .loader-bar:nth-child(5) { animation-delay: 0.6s; }
  @keyframes barPulse { 0%,100%{transform:scaleY(0.3);opacity:0.4} 50%{transform:scaleY(1);opacity:1} }
  .loader-text { color: var(--muted); font-size: 12px; letter-spacing: 3px; text-transform: uppercase; animation: blink 1.5s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .results { margin-top: 60px; display: none; }
  .results.active { display: block; }
  .results-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
  .results-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
  .results-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
  .ai-rec { background: var(--card); border: 1px solid var(--accent2); padding: 20px 24px; margin-bottom: 32px; position: relative; }
  .ai-rec::before { content: 'MEILLEURE IA'; position: absolute; top: -10px; left: 20px; background: var(--accent2); font-size: 10px; font-weight: 700; letter-spacing: 2px; padding: 2px 10px; color: #fff; }
  .ai-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 16px; }
  .ai-card { background: var(--surface); border: 1px solid var(--border); padding: 14px 16px; }
  .ai-card.top { border-color: var(--accent); background: rgba(255,107,43,0.05); position: relative; }
  .ai-card.top::after { content: '★ TOP'; position: absolute; top: 8px; right: 8px; font-size: 9px; color: var(--accent); letter-spacing: 1px; }
  .ai-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .ai-use { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .prompts-grid { display: grid; gap: 16px; }
  .prompt-card { background: var(--card); border: 1px solid var(--border); padding: 24px; position: relative; transition: all 0.3s; }
  .prompt-card:hover { border-color: var(--accent3); transform: translateX(4px); box-shadow: -4px 0 0 var(--accent3); }
  .prompt-num { position: absolute; top: 20px; right: 20px; font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; color: var(--border); line-height: 1; }
  .prompt-style { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent3); margin-bottom: 10px; }
  .prompt-text { font-size: 13px; line-height: 1.8; color: var(--text); padding-right: 40px; white-space: pre-wrap; }
  .copy-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px; padding: 7px 16px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; margin-top: 16px; }
  .copy-btn:hover { border-color: var(--accent3); color: var(--accent3); }
  .copy-btn.copied { border-color: #22c55e; color: #22c55e; }
  .err { color: #ff6b6b; font-size: 13px; padding: 16px; border: 1px solid #ff6b6b; margin-top: 20px; display: none; }
  footer { text-align: center; margin-top: 80px; color: var(--muted); font-size: 11px; letter-spacing: 2px; opacity: 0.5; }
  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  @media (max-width: 600px) { .ai-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-tag">⚡ Prompt Generator</div>
    <h1>FORGE tes<br><span>PROMPTS</span></h1>
    <p class="subtitle">// entre ton idée → reçois des prompts pro + la meilleure IA pour les utiliser</p>
  </header>

  <div class="input-section">
    <span class="input-label">// ton idée brute</span>
    <div class="input-wrapper">
      <div class="input-corner tl"></div>
      <div class="input-corner tr"></div>
      <div class="input-corner bl"></div>
      <div class="input-corner br"></div>
      <textarea id="userIdea" placeholder="Ex: je veux créer une vidéo TikTok drôle avec un chien qui fait du skateboard..." maxlength="500"></textarea>
      <div class="input-footer">
        <span class="char-count"><span id="charNum">0</span>/500</span>
        <span style="font-size:11px;color:var(--muted)">Ctrl+Enter pour générer</span>
      </div>
    </div>
    <div class="examples">
      <span style="font-size:11px;color:var(--muted);align-self:center;letter-spacing:1px;">EXEMPLES →</span>
      <button class="example-chip" onclick="setExample('Générer une image d\'un chien astronaute dans l\'espace')">🐶 Chien astronaute</button>
      <button class="example-chip" onclick="setExample('Écrire une histoire courte et drôle sur un chat qui deteste les lundis')">😂 Histoire drôle</button>
      <button class="example-chip" onclick="setExample('Créer un logo moderne pour une startup de livraison de café')">☕ Logo startup</button>
      <button class="example-chip" onclick="setExample('Faire une vidéo TikTok virale avec des animaux mignons')">🎵 TikTok viral</button>
    </div>
    <button class="generate-btn" onclick="generatePrompts()" id="genBtn">⚡ FORGER MES PROMPTS</button>
    <div class="err" id="errBox"></div>
  </div>

  <div class="loader" id="loader">
    <div class="loader-bars">
      <div class="loader-bar"></div><div class="loader-bar"></div>
      <div class="loader-bar"></div><div class="loader-bar"></div>
      <div class="loader-bar"></div>
    </div>
    <div class="loader-text">Forge en cours...</div>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <div class="results-title">Prompts forgés</div>
      <div class="results-line"></div>
    </div>
    <div class="ai-rec">
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px;">Pour ton idée, voici les IA recommandées :</div>
      <div class="ai-grid" id="aiGrid"></div>
    </div>
    <div class="prompts-grid" id="promptsGrid"></div>
  </div>

  <footer>PROMPT FORGE v1.0 — propulsé par Claude AI</footer>
</div>

<script>
const textarea = document.getElementById('userIdea');
const charNum = document.getElementById('charNum');
textarea.addEventListener('input', () => { charNum.textContent = textarea.value.length; });
textarea.addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) generatePrompts(); });

function setExample(text) {
  textarea.value = text;
  charNum.textContent = text.length;
  textarea.focus();
}

async function generatePrompts() {
  const idea = textarea.value.trim();
  if (!idea) { textarea.focus(); return; }

  document.getElementById('genBtn').disabled = true;
  document.getElementById('loader').classList.add('active');
  document.getElementById('results').classList.remove('active');
  document.getElementById('errBox').style.display = 'none';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idea })
    });
    if (!res.ok) throw new Error(`Erreur serveur ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    displayResults(data);
  } catch (err) {
    const box = document.getElementById('errBox');
    box.textContent = '❌ ' + err.message;
    box.style.display = 'block';
  } finally {
    document.getElementById('loader').classList.remove('active');
    document.getElementById('genBtn').disabled = false;
  }
}

function displayResults(data) {
  document.getElementById('aiGrid').innerHTML = data.ias.map(ai => `
    <div class="ai-card ${ai.top ? 'top' : ''}">
      <div class="ai-name">${ai.nom}</div>
      <div class="ai-use">${ai.usage}</div>
    </div>`).join('');

  document.getElementById('promptsGrid').innerHTML = data.prompts.map((p, i) => `
    <div class="prompt-card">
      <div class="prompt-num">0${i + 1}</div>
      <div class="prompt-style">${p.style}</div>
      <div class="prompt-text" id="pt-${i}">${p.texte}</div>
      <button class="copy-btn" onclick="copyPrompt(${i}, this)">⎘ Copier</button>
    </div>`).join('');

  document.getElementById('results').classList.add('active');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyPrompt(i, btn) {
  navigator.clipboard.writeText(document.getElementById(`pt-${i}`).textContent).then(() => {
    btn.textContent = '✓ Copié !';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⎘ Copier'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
